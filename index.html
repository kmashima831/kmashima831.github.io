<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GA4 Test Site</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6WZKF324KJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Debug mode for DebugView (remove later for "production" behavior)
    gtag('config', 'G-6WZKF324KJ', { debug_mode: true });
  </script>
</head>

<body>
  <h1>GA4 Test Site</h1>
  <p>This is a test page for Google Analytics 4.</p>

  <!-- Contact -->
  <p><a href="mailto:test@example.com" id="contact">Contact</a></p>

  <!-- Download (dummy file) -->
  <p><a href="./cv.pdf" id="download_cv" download>Download CV</a></p>

  <script>
    // Contact click -> send event -> then open mailto
    document.getElementById('contact').addEventListener('click', function (e) {
      e.preventDefault();

      gtag('event', 'contact_click', { debug_mode: true });

      setTimeout(function () {
        window.location.href = 'mailto:test@example.com';
      }, 800);
    });

    // Download click -> send event -> then continue to download
    document.getElementById('download_cv').addEventListener('click', function (e) {
      // Some browsers start download immediately; we delay slightly to increase chance event is sent
      e.preventDefault();

      gtag('event', 'cv_download_click', { debug_mode: true });

      setTimeout(function () {
        window.location.href = './cv.pdf';
      }, 400);
    });
  </script>
</body>
</html>
