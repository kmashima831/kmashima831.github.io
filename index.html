<a href="mailto:test@example.com" id="contact">Contact</a>

<script>
  document.getElementById('contact').addEventListener('click', function (e) {
    e.preventDefault(); // まず遷移を止める

    gtag('event', 'contact_click', {
      event_callback: function () {
        window.location.href = 'mailto:test@example.com'; // 送信後に遷移
      }
    });

    // callbackが動かない/遅い環境の保険
    setTimeout(function () {
      window.location.href = 'mailto:test@example.com';
    }, 800);
  });
</script>
